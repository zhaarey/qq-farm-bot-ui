name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 生成日期-短哈希标签
      - name: Generate Tag
        id: tag
        run: |
          export TZ='Asia/Shanghai'
          echo "datetime=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 登录 GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 登录 Docker Hub (请确保已在 Settings -> Secrets 中配置)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建并推送
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # 【关键修改 1】上下文依然设为根目录，这样 Docker 能读取到项目所有文件
          context: .
          # 【关键修改 2】明确指定 core 目录下的 Dockerfile
          file: ./core/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.datetime }}-${{ steps.tag.outputs.sha_short }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ steps.tag.outputs.datetime }}-${{ steps.tag.outputs.sha_short }}
